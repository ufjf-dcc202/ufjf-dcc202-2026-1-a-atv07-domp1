<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCC202 Tabelas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>
<body>
    <h1 style="display: flex; margin-top: 24px;">DCC202 Tabelas</h1>
    <div style="display: flex; flex-direction: column; align-items: center; margin-top: 48px;">
        <h2 style="display: flex;">Lista de Pokemons</h2>
        <table style="width: 90%; margin: auto; ">
            <thead>
                <tr>
                    <th>Pokemon</th>
                    <th>HP</th>
                    <th>CP</th>
                    <th>SP</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Bulbasaur</td>
                    <td>45</td>
                    <td>49</td>
                    <td>49</td>
                </tr>
                <tr>
                    <td>Charmander</td>
                    <td>39</td>
                    <td>52</td>
                    <td>43</td>
                </tr>
                <tr>
                    <td>Squirtle</td>
                    <td>44</td>
                    <td>48</td>
                    <td>65</td>
                </tr>
        </table>
    </div>
</body>
</html>
